# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "narrated-record-replay"
description = "Skill-local Codex worktree environment for narrated Record & Replay development."

[setup]
script = '''
repo="${CODEX_WORKTREE_PATH:-$PWD}"
cd "$repo"
bash .codex/setup-worktree-env.sh
'''

[cleanup]
script = '''
repo="$(pwd -P)"
if [ -n "${CODEX_WORKTREE_PATH:-}" ]; then
  declared_repo="$(cd -- "$CODEX_WORKTREE_PATH" && pwd -P)"
  if [ "$declared_repo" != "$repo" ]; then
    echo "Refusing cleanup outside the runner worktree: $declared_repo" >&2
    exit 2
  fi
fi
state_root="$repo/.codex-worktree"
if [ -L "$state_root" ]; then
  echo "Refusing symlinked worktree state root: $state_root" >&2
  exit 2
fi
if [ -e "$state_root" ] && [ ! -d "$state_root" ]; then
  echo "Refusing non-directory worktree state root: $state_root" >&2
  exit 2
fi
rm -rf -- "$state_root"
'''

[[actions]]
name = "Setup Worktree Env"
script = '''
bash .codex/setup-worktree-env.sh
'''

[[actions]]
name = "Fast Check"
script = '''
test -f .codex-worktree/env.sh || {
  echo "scripts/check is required for Fast Check, but .codex-worktree/env.sh is missing" >&2
  exit 2
}
. .codex-worktree/env.sh
bash scripts/check
'''

[[actions]]
name = "Print Env Path"
script = '''
printf '%s\n' '.codex-worktree/env.sh'
'''
